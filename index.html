<!DOCTYPE html>
<html>
<head>
    <title>AutoML Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial;
            padding: 30px;
            background: #f5f7fa;
        }
        h2 {
            color: #333;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }
        table {
            margin-top: 20px;
            border-collapse: collapse;
            width: 60%;
            background: white;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }
        th {
            background: #007bff;
            color: white;
        }
        .best {
            background-color: #d4edda;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>🚀 AutoML Model Selector</h2>

    <input type="file" id="fileInput"><br><br>
    <input type="text" id="target" placeholder="Enter target column"><br><br>

    <button onclick="upload()">Run Models</button>

    <h3>🏆 Results</h3>
    <table id="table"></table>

    <canvas id="chart" width="400" height="200"></canvas>

    <script>
        async function upload() {
            const file = document.getElementById("fileInput").files[0];
            const target = document.getElementById("target").value;

            if (!file || !target) {
                alert("Upload file + enter target");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);
            formData.append("target", target);

            const res = await fetch("http://127.0.0.1:8000/upload/", {
                method: "POST",
                body: formData
            });

            const data = await res.json();
            const results = data.results;

            let table = "<tr><th>Rank</th><th>Model</th><th>Accuracy</th></tr>";

            let labels = [];
            let values = [];

            results.forEach((r, i) => {
                const isBest = i === 0 ? "best" : "";

                table += `<tr class="${isBest}">
                    <td>${i+1}</td>
                    <td>${r.model}</td>
                    <td>${r.accuracy}</td>
                </tr>`;

                labels.push(r.model);
                values.push(r.accuracy);
            });

            document.getElementById("table").innerHTML = table;

            if (window.myChart) window.myChart.destroy();

            window.myChart = new Chart(document.getElementById("chart"), {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "Accuracy",
                        data: values
                    }]
                }
            });
        }
    </script>

</body>
</html>
