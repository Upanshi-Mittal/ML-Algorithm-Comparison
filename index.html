<!DOCTYPE html>
<html>

<head>
    <title>AutoML Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h2 {
            margin-bottom: 10px;
        }

        input,
        button {
            padding: 10px;
            margin: 5px 0;
        }

        button {
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th,
        td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #007bff;
            color: white;
        }

        .best {
            background: #d4edda;
            font-weight: bold;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        

        canvas {
            width: 100% !important;
            height: 100% !important;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="card">
            <h2>🚀 AutoML Model Selector</h2>

            <input type="file" id="fileInput"><br>
            <input type="text" id="target" placeholder="Enter target column"><br>
            <input type="text" id="urlInput" placeholder="Paste dataset URL (optional)">
            <br>
            <button onclick="loadFromURL()">Load from URL</button>
            <button onclick="upload()">Run Models</button>
            <button onclick="downloadModel()">Download Best Model</button>
        </div>

        <!-- Dataset Info -->
        <div class="card">
            <h3>📊 Dataset Analysis</h3>
            <p id="analysis"></p>
        </div>

        <!-- Results -->
        <div class="card">
            <h3>🏆 Model Ranking</h3>
            <table id="table"></table>
            <p id="explanation"></p>
        </div>

        <div class="grid">

            <div class="card">
                <h3>📈 Model Performance</h3>
                <canvas id="chart"></canvas>
            </div>

            <div class="card">
                <h3>🌟 Feature Importance</h3>
                <canvas id="featureChart"></canvas>
            </div>

        </div>

        <div class="card">
            <h3>📉 Confusion Matrix</h3>
            <div id="cmChart"></div>
        </div>

    </div>
    <div class="card">
        <h3>📊 Data Visualization</h3>

        <label>X Axis:</label>
        <select id="xCol"></select>

        <label>Y Axis:</label>
        <select id="yCol"></select>

        <label>Chart Type:</label>
        <select id="chartType">
            <option value="bar">Bar</option>
            <option value="line">Line</option>
            <option value="scatter">Scatter</option>
        </select>

        <br><br>
        <button onclick="visualize()">Visualize</button>

        <div style="width:600px; height:350px; margin:auto;">
            <canvas id="vizChart"></canvas>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-matrix"></script>

    <script>
        let globalData = null;







        function downloadModel() {
            window.open("http://127.0.0.1:8000/download/");
        }
        async function loadFromURL() {
            const url = document.getElementById("urlInput").value;
            const target = document.getElementById("target").value;

            if (!url || !target) {
                alert("Enter URL + target");
                return;
            }

            const res = await fetch("http://127.0.0.1:8000/load_url/", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ url, target })
            });

            const data = await res.json();
            processData(data);
        }


        async function upload() {
            const file = document.getElementById("fileInput").files[0];
            const target = document.getElementById("target").value;

            if (!file || !target) {
                alert("Upload file + enter target");
                return;
            }

            const formData = new FormData();
            formData.append("file", file);
            formData.append("target", target);

            const res = await fetch("http://127.0.0.1:8000/upload/", {
                method: "POST",
                body: formData
            });

            const data = await res.json();
            processData(data);
        }
        function processData(data) {
            console.log("DATA:", data);
            const results = data.results;

            // -------- Dataset Analysis --------
            document.getElementById("analysis").textContent =
                `Rows: ${data.analysis.rows}, Columns: ${data.analysis.columns}`;

            // -------- Table --------
            let table = "<tr><th>Rank</th><th>Model</th><th>Score</th></tr>";
            let labels = [], values = [];

            results.forEach((r, i) => {
                const score = r.accuracy ?? r.r2_score;

                table += `<tr class="${i === 0 ? 'best' : ''}">
            <td>${i + 1}</td>
            <td>${r.model}</td>
            <td>${score}</td>
        </tr>`;

                labels.push(r.model);
                values.push(score);
            });

            document.getElementById("table").innerHTML = table;
            document.getElementById("explanation").textContent = data.explanation;

            // -------- Performance Chart --------
            if (window.chart?.destroy) window.chart.destroy();

            window.chart = new Chart(document.getElementById("chart"), {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{ label: "Score", data: values }]
                }
            });

            // -------- Feature Importance --------
            if (data.feature_importance && data.feature_importance.length > 0) {
                if (window.featureChart?.destroy) window.featureChart.destroy();

                window.featureChart = new Chart(document.getElementById("featureChart"), {
                    type: "bar",
                    data: {
                        labels: data.feature_importance.map(f => f.feature),
                        datasets: [{
                            label: "Importance",
                            data: data.feature_importance.map(f => f.importance)
                        }]
                    }
                });
                console.log("FI:", data.feature_importance);

                // -------- Confusion Matrix --------
                if (data.confusion_matrix && data.confusion_matrix.length > 0) {
                    if (window.cmChart?.destroy) window.cmChart.destroy();

                    const cm = data.confusion_matrix;

                    window.cmChart = new Chart(document.getElementById("cmChart"), {
                        type: "matrix",
                        data: {
                            datasets: [{
                                label: "Confusion Matrix",
                                data: [
                                    { x: 0, y: 0, v: cm[0][0] },
                                    { x: 1, y: 0, v: cm[0][1] },
                                    { x: 0, y: 1, v: cm[1][0] },
                                    { x: 1, y: 1, v: cm[1][1] },
                                ],
                                backgroundColor(ctx) {
                                    const value = ctx.raw.v;
                                    return `rgba(0, 123, 255, ${value / 100})`;
                                },
                                width: ({ chart }) => (chart.chartArea || {}).width / 2 - 1,
                                height: ({ chart }) => (chart.chartArea || {}).height / 2 - 1,
                            }]
                        },
                        options: {
                            scales: {
                                x: { type: 'linear', position: 'top', ticks: { stepSize: 1 } },
                                y: { ticks: { stepSize: 1 } }
                            }
                        }

                    });

                    console.log("CM:", data.confusion_matrix);
                    console.log("FI:", data.feature_importance);
                }
            }
            const cm = data.confusion_matrix;

            let html = "<table style='margin:auto;'>";
            for (let i = 0; i < cm.length; i++) {
                html += "<tr>";
                for (let j = 0; j < cm[i].length; j++) {
                    const val = cm[i][j];
                    const maxVal = Math.max(...cm.flat());
                    const color = `rgba(0,123,255,${val / 100})`;

                    html += `<td style="
            width:80px;
            height:80px;
            text-align:center;
            background:${color};
            font-weight:bold;
        ">${val}</td>`;
                }
                html += "</tr>";
            }
            html += "</table>";
            const xSelect = document.getElementById("xCol");
            const ySelect = document.getElementById("yCol");

            xSelect.innerHTML = "";
            ySelect.innerHTML = "";

            data.columns.forEach(col => {
                xSelect.innerHTML += `<option value="${col}">${col}</option>`;
                ySelect.innerHTML += `<option value="${col}">${col}</option>`;
            });

            globalData = data.preview;
            document.getElementById("cmChart").innerHTML = html;
        }

        function visualize() {
            if (!globalData) {
                alert("Run model first!");
                return;
            }

            const xCol = document.getElementById("xCol").value;
            const yCol = document.getElementById("yCol").value;
            const type = document.getElementById("chartType").value;

            if (window.vizChartObj) window.vizChartObj.destroy();

            const ctx = document.getElementById("vizChart").getContext("2d"); // 🔥 FIX

            // -------- SCATTER --------
            if (type === "scatter") {

                const scatterData = globalData
                    .map(row => ({
                        x: parseFloat(row[xCol]),
                        y: parseFloat(row[yCol])
                    }))
                    .filter(p => !isNaN(p.x) && !isNaN(p.y));

                if (scatterData.length === 0) {
                    alert("Only numeric columns allowed for scatter!");
                    return;
                }

                window.vizChartObj = new Chart(ctx, {
                    type: "scatter",
                    data: {
                        datasets: [{
                            label: `${yCol} vs ${xCol}`,
                            data: scatterData,
                            pointRadius: 5
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false
                    }
                });
            }

            // -------- BAR / LINE --------
            else {
                const grouped = {};

                globalData.forEach(row => {
                    const key = row[xCol];
                    const val = parseFloat(row[yCol]) || 0;

                    if (!grouped[key]) grouped[key] = [];
                    grouped[key].push(val);
                });

                const labels = Object.keys(grouped);
                const values = labels.map(k =>
                    grouped[k].reduce((a, b) => a + b, 0) / grouped[k].length
                );

                window.vizChartObj = new Chart(ctx, {
                    type: type,
                    data: {
                        labels: labels,
                        datasets: [{
                            label: `${yCol} by ${xCol}`,
                            data: values
                        }]
                    }
                });
            }
        }

    </script>

</body>

</html>
